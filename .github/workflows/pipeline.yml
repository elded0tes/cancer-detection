# ──────────────────────────────────────────────────────────────────────────────
#  GitHub Actions — Cancer Detection Pipeline
#  Se ejecuta en: push a main/develop, PR a main, y manualmente (workflow_dispatch)
# ──────────────────────────────────────────────────────────────────────────────

name: Cancer Detection Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      source:
        description: "Fuente del dataset (sklearn | uci)"
        required: false
        default: "sklearn"
      retrain:
        description: "Forzar reentrenamiento (true | false)"
        required: false
        default: "false"

env:
  PYTHON_VERSION: "3.11"
  MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"

jobs:
  pipeline:
    name: Train & Evaluate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ── Dependencias ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Crear directorios necesarios ────────────────────────────────────
      - name: Create required directories
        run: mkdir -p data models plots logs

      # ── Ajustar tracking URI para CI (SQLite en lugar de HTTP) ──────────
      - name: Configure MLFlow for CI
        run: |
          python - << 'PYEOF'
          import yaml
          with open("config.yaml") as f:
              cfg = yaml.safe_load(f)
          cfg["mlflow"]["tracking_uri"] = "sqlite:///mlflow.db"
          with open("config.yaml", "w") as f:
              yaml.dump(cfg, f, default_flow_style=False)
          PYEOF

      # ── Ejecutar pipeline ────────────────────────────────────────────────
      - name: Run pipeline
        run: |
          SOURCE="${{ github.event.inputs.source || 'sklearn' }}"
          RETRAIN="${{ github.event.inputs.retrain || 'false' }}"
          ARGS="--source $SOURCE"
          if [ "$RETRAIN" = "true" ]; then ARGS="$ARGS --retrain"; fi
          python main.py $ARGS

      # ── Publicar artefactos (plots, modelo, logs) ────────────────────────
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results-${{ github.run_number }}
          path: |
            plots/
            models/
            logs/
            mlflow.db
          retention-days: 30

      # ── Resumen en el paso de GitHub ─────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "- Run number: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Plots saved in: plots/" >> $GITHUB_STEP_SUMMARY
          if [ -f logs/pipeline.log ]; then
            echo "### Last 20 log lines" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 logs/pipeline.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
