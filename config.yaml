data:
  csv_path: data/raw.csv
  output_path: data/dataset.csv
  random_state: 42
  source: sklearn
  target_column: diagnosis
  test_size: 0.2
  uci_id: 17
mlflow:
  artifact_path: model
  experiment_name: cancer-detection
  run_name: wisconsin-rf
  tracking_uri: sqlite:///mlflow.db
model:
  cross_val_folds: 5
  name: RandomForest
  params:
    max_depth: 8
    min_samples_split: 4
    n_estimators: 200
    random_state: 42
  registered_model_name: CancerDetectionModel
  retrain: true
paths:
  logs_dir: logs
  models_dir: models
  plots_dir: plots
preprocessing:
  drop_columns:
  - id
  - 'Unnamed: 32'
  fill_strategy: mean
  scaler: standard
